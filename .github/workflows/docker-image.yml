name: Docker Image CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # уникальный тег для каждого запуска workflow
      IMAGE_TAG: datapeice/astolfos-player-api:${{ github.run_id }}

    steps:
    - uses: actions/checkout@v4

    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Docker image
      run: |
        echo "Building Docker image $IMAGE_TAG"
        docker build . -f Dockerfile -t $IMAGE_TAG
        docker tag $IMAGE_TAG datapeice/astolfos-player-api:latest

    - name: Push Docker image
      run: |
        echo "Pushing Docker images..."
        docker push $IMAGE_TAG
        docker push datapeice/astolfos-player-api:latest
